name: Deploy Checkout Worker

on:
  push:
    branches:
      - master
    paths:
      - 'checkout-worker/**'
  workflow_dispatch:

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Workers
        run: |
          export CLOUDFLARE_ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo "$CHARIOW_API_KEY" | wrangler secret put CHARIOW_API_KEY --env production
          wrangler deploy --env production
        working-directory: checkout-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CHARIOW_API_KEY: ${{ secrets.CHARIOW_API_KEY }}
