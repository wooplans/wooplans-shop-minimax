<!-- MERCI PAGE STYLES -->
<style>
.merci-hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:120px 5vw 60px;
  text-align:center
}
.merci-card{
  background:white;
  border-radius:20px;
  padding:48px;
  max-width:560px;
  width:100%;
  box-shadow:0 4px 40px rgba(26,18,8,.08)
}
.merci-icon{
  width:80px;
  height:80px;
  background:var(--vert-bg);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 24px
}
.merci-icon svg{width:40px;height:40px;stroke:var(--vert);stroke-width:2;fill:none}
.merci-title{
  font-family:'Cormorant Garamond',serif;
  font-size:2rem;
  font-weight:600;
  color:var(--brun);
  margin-bottom:12px
}
.merci-subtitle{
  font-size:1rem;
  color:var(--gris);
  margin-bottom:32px;
  line-height:1.6
}
.merci-plan-name{
  background:var(--creme-2);
  border-radius:12px;
  padding:20px;
  margin-bottom:28px
}
.merci-plan-name .label{
  font-size:.75rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--gris);
  margin-bottom:6px
}
.merci-plan-name .name{
  font-family:'Cormorant Garamond',serif;
  font-size:1.3rem;
  font-weight:600;
  color:var(--brun)
}
.merci-plan-name .type{
  font-size:.85rem;
  color:var(--terre);
  margin-top:4px
}
.merci-download-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:var(--brun);
  color:var(--or);
  font-size:1rem;
  font-weight:600;
  padding:18px 36px;
  border-radius:10px;
  text-decoration:none;
  transition:background .25s,transform .2s,box-shadow .25s;
  margin-bottom:16px
}
.merci-download-btn:hover{
  background:var(--terre);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(139,94,60,.28)
}
.merci-download-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none}
.merci-trust{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-size:.82rem;
  color:var(--gris)
}
.merci-trust svg{width:14px;height:14px;fill:var(--vert);stroke:none}
.merci-whatsapp{
  margin-top:32px;
  padding-top:28px;
  border-top:1px solid var(--creme-3)
}
.merci-whatsapp p{
  font-size:.9rem;
  color:var(--gris-fonce);
  margin-bottom:16px
}
.merci-whatsapp-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:#25D366;
  color:white;
  font-size:.9rem;
  font-weight:600;
  padding:14px 28px;
  border-radius:10px;
  text-decoration:none;
  transition:background .25s,transform .2s
}
.merci-whatsapp-btn:hover{
  background:#1da851;
  transform:translateY(-1px)
}
.merci-whatsapp-btn svg{width:18px;height:18px;fill:white;stroke:none}
.merci-browse{
  margin-top:32px
}
.merci-browse a{
  color:var(--terre);
  font-weight:500;
  text-decoration:none;
  border-bottom:1px solid var(--terre-clair);
  transition:border-color .2s
}
.merci-browse a:hover{border-color:var(--terre)}
@media(max-width:600px){
  .merci-card{padding:32px 24px}
  .merci-title{font-size:1.6rem}
}
</style>

<!-- PLANS DATA -->
<script>
window.PLANS_DATA = {{plansJson}};

<!-- MERCI LOGIC -->
<script>
(function(){
  var urlParams = new URLSearchParams(window.location.search);
  var planSlug = urlParams.get('plan');
  
  // Define tracking functions first
  function trackPurchaseGeneric() {
    if (!window.fbq) return false;
    fbq('track', 'Purchase', {
      value: 14900,
      currency: 'XAF',
      content_name: planSlug || 'Plan WooPlans',
      content_type: 'product',
      content_ids: [planSlug || 'unknown'],
      num_items: 1
    });
    return true;
  }
  
  if (!planSlug) {
    document.getElementById('merci-plan-title').textContent = 'Plan non spécifié';
    trackPurchaseGeneric();
    return;
  }
  
  var plan = window.PLANS_DATA.find(function(p) {
    return p.slug === planSlug;
  });
  
  if (!plan) {
    document.getElementById('merci-plan-title').textContent = 'Commande confirmée';
    document.getElementById('merci-plan-type').textContent = 'Merci pour votre achat !';
    trackPurchaseGeneric();
    return;
  }
  
  document.getElementById('merci-plan-title').textContent = plan.title;
  document.getElementById('merci-plan-type').textContent = (plan.type === 'villa' ? 'Villa' : 'Duplex') + ' · ' + plan.surface + ' m² · ' + plan.rooms + ' ch';
  
  if (plan.pdfBasicUrl) {
    var downloadBtn = document.getElementById('merci-download-btn');
    downloadBtn.href = plan.pdfBasicUrl;
    downloadBtn.style.display = 'inline-flex';
  }

  function trackPurchase() {
    if (!window.fbq) return false;
    var price = parseInt(String(plan.price || '14900').replace(/\s/g, '')) || 14900;
    fbq('track', 'Purchase', {
      value: price,
      currency: 'XAF',
      content_name: plan.title,
      content_type: 'product',
      content_ids: [plan.id],
      num_items: 1
    });
    return true;
  }

  if (!trackPurchase()) {
    var tries = 0;
    var poll = setInterval(function() {
      tries++;
      if (trackPurchase() || tries > 20) clearInterval(poll);
    }, 300);
  }
})();
</script>
